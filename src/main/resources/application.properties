# --- View resolver (JSP) ---
spring.mvc.view.prefix=/WEB-INF/

# --- Datasource (PostgreSQL / Supabase) ---
# All values are environment-driven so no credentials live in the repo.
# Local defaults point at a local Postgres; in Cloud Run set DB_URL/DB_USERNAME/DB_PASSWORD.
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/postgres}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# Keep the pool small — Supabase's free tier has a low connection ceiling.
spring.datasource.hikari.maximum-pool-size=${DB_POOL_SIZE:5}

# --- JPA / Hibernate ---
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update

# --- MVC ---
spring.mvc.hiddenmethod.filter.enabled=true

# --- Server (Cloud Run injects PORT; defaults to 8080 locally) ---
server.port=${PORT:8080}
